experiment:
  name: asymmetric_ablation_no_index_entropy_anneal_200k
  seed: 67
  device: cuda

environment:
  layout_name: asymmetric_advantages
  layout_file: null
  horizon: 400
  old_dynamics: true
  mdp_overrides: {}

observation:
  type: featurized
  include_agent_index: false

model:
  architecture: mlp_actor_critic
  parameters:
    hidden_sizes: [128, 128]
    activation: tanh

training:
  algorithm: ppo
  total_steps: 200000
  num_environments: 8
  rollout_steps: 128
  reward_shaping: 1.0
  ppo:
    learning_rate: 0.0003
    gamma: 0.99
    gae_lambda: 0.95
    clip_coefficient: 0.2
    value_coefficient: 0.5
    entropy_coefficient: 0.01
    entropy_final_coefficient: 0.001
    entropy_anneal_steps: 200000
    update_epochs: 4
    minibatch_size: 1024
    max_grad_norm: 0.5

partner:
  sampler: self_play
  policies: []

evaluation:
  layouts: [asymmetric_advantages]
  partners:
    - name: greedy_full_task
      policy:
        type: builtin
        name: greedy_full_task
        max_action_time_ms: 100
  seeds: [67, 68, 69, 70, 71]
  player_positions: [0, 1]
  inference_modes: [deterministic, stochastic]

checkpoint:
  resume_from: null
  save_interval: 50000
  export_path: ../../outputs/asymmetric_ablation_no_index_entropy_anneal_200k/checkpoints/inference.pt

outputs:
  root: ../../outputs/asymmetric_ablation_no_index_entropy_anneal_200k
  logs: ../../outputs/asymmetric_ablation_no_index_entropy_anneal_200k/logs
  checkpoints: ../../outputs/asymmetric_ablation_no_index_entropy_anneal_200k/checkpoints
  metrics: ../../outputs/asymmetric_ablation_no_index_entropy_anneal_200k/metrics
