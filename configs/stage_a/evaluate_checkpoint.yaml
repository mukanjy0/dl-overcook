paths_relative_to_config: true
mode: evaluate
seed: 67

environment:
  layout_name: cramped_room
  layout_file: null
  horizon: 400
  old_dynamics: true

observation:
  type: featurized
  include_agent_index: true

policies:
  agent_0:
    type: python_class
    name: stage_a_rl
    path: ../../policies/rl_policy.py
    class_name: StudentAgent
    config:
      checkpoint_path: ../../outputs/stage_a/checkpoints/inference.pt
      device: auto
      deterministic: true
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: random_motion
    max_action_time_ms: 100

execution:
  num_episodes: 3
  episode_seeds: [67, 68, 69]
  ego_player_positions: [0, 1]

evaluation:
  layouts:
    - cramped_room
  partners:
    - name: random_motion
      policy:
        type: builtin
        name: random_motion
        max_action_time_ms: 100
  seeds: [67, 68, 69]
  player_positions: [0, 1]
  deterministic: true

rendering:
  mode: none

logging:
  output_dir: ../../outputs/stage_a/evaluation
  save_step_log: false
  save_episode_summary: true
  save_trajectory_pickle: false

data_collection:
  enabled: false
