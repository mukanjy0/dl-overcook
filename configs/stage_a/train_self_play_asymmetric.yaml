experiment:
  name: stage_a_asymmetric_competitive_seed67
  seed: 67
  device: cuda

environment:
  layout_name: asymmetric_advantages
  layout_file: null
  horizon: 400
  old_dynamics: true
  mdp_overrides: {}

observation:
  type: featurized
  include_agent_index: true

model:
  architecture: mlp_actor_critic
  parameters:
    hidden_sizes: [128, 128]
    activation: tanh

training:
  algorithm: ppo
  total_steps: 1000000
  num_environments: 8
  rollout_steps: 128
  reward_shaping: 1.0
  ppo:
    learning_rate: 0.0003
    gamma: 0.99
    gae_lambda: 0.95
    clip_coefficient: 0.2
    value_coefficient: 0.5
    entropy_coefficient: 0.01
    update_epochs: 4
    minibatch_size: 1024
    max_grad_norm: 0.5

partner:
  sampler: self_play
  policies: []

evaluation:
  layouts: [asymmetric_advantages]
  partners: [self_play]
  seeds: [67, 68, 69]
  player_positions: [0, 1]
  deterministic: true

checkpoint:
  resume_from: null
  save_interval: 100000
  export_path: ../../outputs/stage_a_asymmetric_seed67/checkpoints/inference.pt

outputs:
  root: ../../outputs/stage_a_asymmetric_seed67
  logs: ../../outputs/stage_a_asymmetric_seed67/logs
  checkpoints: ../../outputs/stage_a_asymmetric_seed67/checkpoints
  metrics: ../../outputs/stage_a_asymmetric_seed67/metrics
