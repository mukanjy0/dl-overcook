experiment: {name: asymmetric_weighted_pool_seed68_300k, seed: 68, device: cpu}
environment:
  layout_name: asymmetric_advantages
  layout_file: null
  horizon: 400
  old_dynamics: true
  mdp_overrides: {}
observation: {type: featurized, include_agent_index: true}
model:
  architecture: mlp_actor_critic
  parameters: {hidden_sizes: [128, 128], activation: tanh}
training:
  algorithm: ppo
  # 900096 checkpoint steps + 300032 continuation steps.
  total_steps: 1200128
  num_environments: 8
  rollout_steps: 128
  reward_shaping: 1.0
  ppo:
    learning_rate: 0.0001
    gamma: 0.99
    gae_lambda: 0.95
    clip_coefficient: 0.2
    value_coefficient: 0.5
    entropy_coefficient: 0.005
    update_epochs: 4
    minibatch_size: 512
    max_grad_norm: 0.5
partner:
  sampler: weighted_pool
  position_sampler: balanced
  policies:
    - &greedy
      name: greedy_full_task
      weight: 0.30
      source: teacher_scripted
      policy: {type: builtin, name: greedy_full_task, max_action_time_ms: 100}
    - &sticky
      name: sticky_greedy
      weight: 0.20
      source: teacher_scripted_variant
      policy:
        type: builtin
        name: greedy_full_task
        sticky_action_prob: 0.20
        max_action_time_ms: 100
    - &sticky_random
      name: sticky_random_greedy
      weight: 0.20
      source: teacher_scripted_variant
      policy:
        type: builtin
        name: greedy_full_task
        sticky_action_prob: 0.20
        random_action_prob: 0.10
        max_action_time_ms: 100
    - &random_motion
      name: random_motion
      weight: 0.10
      source: teacher_scripted
      policy: {type: builtin, name: random_motion, max_action_time_ms: 100}
    - &frozen_sp
      name: frozen_sp_no_index
      weight: 0.20
      source: frozen_checkpoint
      observation: {type: featurized, include_agent_index: false}
      policy:
        type: python_class
        name: frozen_sp_no_index
        path: ../../policies/rl_policy.py
        class_name: StudentAgent
        config:
          checkpoint_path: ../../outputs/asymmetric_ablation_no_agent_index_200k/checkpoint_evaluation/selected/inference.pt
          device: cpu
          deterministic: false
        max_action_time_ms: 100
evaluation:
  layouts: [asymmetric_advantages]
  partners: [*greedy, *sticky, *sticky_random, *random_motion, *frozen_sp]
  seeds: [67, 68, 69, 70, 71]
  player_positions: [0, 1]
  inference_modes: [deterministic, stochastic]
checkpoint:
  resume_from: ../../outputs/stage_a_asymmetric_seed67/selected/training_step_000900096.pt
  load_optimizer_state: false
  restore_rng_state: false
  save_interval: 50176
  export_path: ../../outputs/stage_c_asymmetric_weighted_pool_seed68_300k/checkpoints/inference.pt
outputs:
  root: ../../outputs/stage_c_asymmetric_weighted_pool_seed68_300k
  logs: ../../outputs/stage_c_asymmetric_weighted_pool_seed68_300k/logs
  checkpoints: ../../outputs/stage_c_asymmetric_weighted_pool_seed68_300k/checkpoints
  metrics: ../../outputs/stage_c_asymmetric_weighted_pool_seed68_300k/metrics
