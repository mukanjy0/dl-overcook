experiment: {name: coordination_ring_augmented_seed2_200k, seed: 2, device: cpu}
environment: {layout_name: coordination_ring, layout_file: null, horizon: 400, old_dynamics: true, mdp_overrides: {}}
observation: {type: featurized, include_agent_index: true}
model: {architecture: mlp_actor_critic, parameters: {hidden_sizes: [128, 128], activation: tanh}}
training:
  algorithm: ppo
  total_steps: 200704
  num_environments: 8
  rollout_steps: 128
  reward_shaping: 1.0
  ppo: {learning_rate: 0.0003, gamma: 0.99, gae_lambda: 0.95, clip_coefficient: 0.2, value_coefficient: 0.5, entropy_coefficient: 0.01, update_epochs: 4, minibatch_size: 1024, max_grad_norm: 0.5}
partner: {sampler: self_play, policies: []}
state_augmentation:
  reset_mode: augmented
  buffer_path: ../../outputs/stage_b/buffers/coordination_ring_stage_a_crossplay.json.gz
evaluation:
  layouts: [coordination_ring]
  partners: [self_play]
  seeds: [0, 1, 2, 3, 4]
  player_positions: [0, 1]
  inference_modes: [deterministic, stochastic]
checkpoint:
  resume_from: null
  save_interval: 50176
  export_path: ../../outputs/coordination_ring_augmented_seed2_200k/checkpoints/inference.pt
outputs:
  root: ../../outputs/coordination_ring_augmented_seed2_200k
  logs: ../../outputs/coordination_ring_augmented_seed2_200k/logs
  checkpoints: ../../outputs/coordination_ring_augmented_seed2_200k/checkpoints
  metrics: ../../outputs/coordination_ring_augmented_seed2_200k/metrics
