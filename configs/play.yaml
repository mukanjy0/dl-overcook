seed: 67
mode: debug
environment:
  layout_name: cramped_room
  layout_file: null
  horizon: 250
  old_dynamics: true
policies:
  agent_0:
    type: builtin
    name: greedy_full_task
    ingredient: onion
    avoid_teammate: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: random_motion
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 1
  episode_seeds:
  - 67
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 5
  window_caption: Overcooked-AI Basic Policies
  save_gif: false
  gif_path: outputs/basic_policies.gif
logging:
  output_dir: outputs/basic_policies_run
  save_step_log: true
  save_episode_summary: true
  save_trajectory_pickle: true
